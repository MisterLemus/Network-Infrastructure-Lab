! =============================================
! R1 - Edge Router Configuration
! Cisco 2911 | IOS 15.x
! Author: José  Lemus 
! =============================================

hostname R1-EDGE
enable secret 0 $ecureP@ss2025
service password-encryption
no ip domain-lookup
banner motd # AUTHORIZED ACCESS ONLY - All activity is monitored #

! --- Security Hardening ---
security passwords min-length 10
login block-for 120 attempts 3 within 60
username admin privilege 15 secret AdminP@ss2025

! --- SSH Configuration ---
ip domain-name company.local
crypto key generate rsa modulus 2048
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
line vty 0 4
 transport input ssh
 login local
 exec-timeout 10 0

! --- WAN Interface (to ISP) ---
interface GigabitEthernet0/0
 description WAN - Connection to ISP
 ip address dhcp
 ip nat outside
 no shutdown

! --- LAN Interface (to Core Switch) ---
interface GigabitEthernet0/1
 description LAN - Connection to SW-CORE
 ip address 10.0.0.1 255.255.255.252
 ip nat inside
 no shutdown

! --- OSPF Configuration ---
router ospf 1
 router-id 1.1.1.1
 network 10.0.0.0 0.0.0.3 area 0
 default-information originate

! --- NAT/PAT Configuration ---
ip nat inside source list NAT_ACL interface GigabitEthernet0/0 overload
ip access-list standard NAT_ACL
 permit 192.168.10.0 0.0.0.255
 permit 192.168.20.0 0.0.0.255
 permit 192.168.30.0 0.0.0.255
 permit 192.168.40.0 0.0.0.255
 permit 10.10.100.0 0.0.0.255

! --- ACL - Block Telnet from outside ---
ip access-list extended BLOCK_EXTERNAL
 deny tcp any any eq 23
 deny tcp any any eq 80
 permit ip any any

interface GigabitEthernet0/0
 ip access-group BLOCK_EXTERNAL in

! --- NTP ---
ntp server 0.pool.ntp.org
ntp server 1.pool.ntp.org
clock timezone CET 1 0

! --- Logging ---
logging buffered 64000
logging trap informational
logging host 10.10.100.10

! --- Save ---
end
write memory
