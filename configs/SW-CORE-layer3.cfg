! =============================================
! SW-CORE - Layer 3 Core Switch
! Inter-VLAN Routing | EIGRP + OSPF
! Author: José  Lemus 
! =============================================

hostname SW-CORE
enable secret 0 CoreSw1tch2025
service password-encryption
ip routing

! --- VLAN Configuration ---
vlan 10
 name IT_Department
vlan 20
 name HR_Department
vlan 30
 name Sales_Department
vlan 40
 name Management
vlan 99
 name Native_VLAN
vlan 100
 name Servers

! --- SVI Interfaces (Inter-VLAN Routing) ---
interface Vlan10
 description IT Department Gateway
 ip address 192.168.10.1 255.255.255.0
 ip helper-address 10.10.100.5
 no shutdown

interface Vlan20
 description HR Department Gateway
 ip address 192.168.20.1 255.255.255.0
 ip helper-address 10.10.100.5
 no shutdown

interface Vlan30
 description Sales Department Gateway
 ip address 192.168.30.1 255.255.255.0
 ip helper-address 10.10.100.5
 no shutdown

interface Vlan40
 description Management Gateway
 ip address 192.168.40.1 255.255.255.0
 ip helper-address 10.10.100.5
 no shutdown

interface Vlan100
 description Server Farm Gateway
 ip address 10.10.100.1 255.255.255.0
 no shutdown

! --- Uplink to R1 ---
interface GigabitEthernet0/1
 description Uplink to R1-EDGE
 no switchport
 ip address 10.0.0.2 255.255.255.252
 no shutdown

! --- Trunk to Access Switches ---
interface GigabitEthernet0/2
 description Trunk to SW-ACCESS1
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 10,20,99,100
 no shutdown

interface GigabitEthernet0/3
 description Trunk to SW-ACCESS2
 switchport mode trunk
 switchport trunk native vlan 99
 switchport trunk allowed vlan 30,40,99,100
 no shutdown

! --- OSPF ---
router ospf 1
 router-id 2.2.2.2
 network 10.0.0.0 0.0.0.3 area 0
 network 192.168.10.0 0.0.0.255 area 0
 network 192.168.20.0 0.0.0.255 area 0
 network 192.168.30.0 0.0.0.255 area 0
 network 192.168.40.0 0.0.0.255 area 0
 network 10.10.100.0 0.0.0.255 area 0
 passive-interface default
 no passive-interface GigabitEthernet0/1

! --- Port Security (Example) ---
interface range GigabitEthernet0/10-24
 switchport mode access
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
 switchport port-security mac-address sticky
 spanning-tree portfast

! --- ACL - Restrict Management Access ---
ip access-list extended MGMT_ACCESS
 permit ip 192.168.10.0 0.0.0.255 192.168.40.0 0.0.0.255
 permit ip 192.168.40.0 0.0.0.255 any
 deny ip 192.168.30.0 0.0.0.255 192.168.40.0 0.0.0.255
 permit ip any any

end
write memory
